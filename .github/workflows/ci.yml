name: CI

# `push` is scoped to main rather than "**" so a branch that also has a PR open
# does not run CI twice; `pull_request` covers everything else, including forks,
# which produce no push event in this repository and so previously ran nothing
# at all. `pull_request` (not `pull_request_target`) builds the merge commit
# with a read-only token, which is the safe form for untrusted contributions.
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  # Pinned deliberately: an unpinned linter turns an upstream release into a
  # surprise red build on an unrelated commit.
  GOLANGCI_LINT_VERSION: v2.12.2
  # Above rule 17's minimum of 80, with headroom under current coverage so
  # legitimate new code does not red-build. Raise it as coverage rises.
  COVERAGE_MIN: "85"

jobs:
  test:
    name: Go Unit + Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module graph
        run: go mod tidy && git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Lint
        run: golangci-lint run ./...

      # Files behind the integration build tag are invisible to the default
      # run, so they need their own pass.
      - name: Lint (integration build tag)
        run: golangci-lint run --build-tags=integration ./...

      # -race is the point here: the CRL reload goroutine and the response
      # cache are both touched concurrently, and a data race in either is
      # silent without the detector.
      - name: Run unit tests
        run: go test -race ./...

      - name: Run integration tests
        run: go test -race -tags integration ./...

      - name: Coverage
        run: |
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
          ./scripts/coverage-check.sh coverage.out "$COVERAGE_MIN"

      - name: Upload coverage profile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  docker:
    name: Docker Image Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      # QEMU is needed despite the Go build cross-compiling: the runtime stage's
      # `apk add` runs under the target architecture.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Builds without pushing. This guards against a stale base-image pin:
      # go.mod's Go version can move without the Dockerfile following, and the
      # official Go images set GOTOOLCHAIN=local so they refuse to auto-upgrade
      # to satisfy it. Neither `make build` nor the setup-go job above can catch
      # that, because both run a toolchain that satisfies go.mod by
      # construction — this is the only check that uses the pinned one.
      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: false
          # Match the platforms the release workflow publishes. Building only
          # the runner's architecture here means an arm64-only failure would
          # first surface after a tag was pushed, which is the worst moment.
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
