name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Least privilege by default; the publish and release jobs widen this for
# themselves only.
permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.12.2
  COVERAGE_MIN: "85"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # The full suite gates the release: a tag that does not pass does not ship.
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module graph
        run: go mod tidy && git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Lint
        run: golangci-lint run ./...

      - name: Lint (integration build tag)
        run: golangci-lint run --build-tags=integration ./...

      - name: Run unit tests
        run: go test -race ./...

      - name: Run integration tests
        run: go test -race -tags integration ./...

      - name: Coverage
        run: |
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
          ./scripts/coverage-check.sh coverage.out "$COVERAGE_MIN"

  publish:
    name: Build and Publish Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Pin to the commit the test job validated. A tag is mutable, and both
      # jobs otherwise resolve `github.ref` independently, so a retarget
      # between them would publish code that was never tested.
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          ref: ${{ github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `latest` is not listed explicitly: metadata-action's default
          # flavor adds it for any non-prerelease semver tag, which is the
          # behaviour we want. Adding it by hand both duplicated the argument
          # and would have moved `latest` onto a future -rc tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Ship an SBOM and full build provenance with the image so consumers
          # can see what is in it and where it came from. Not a substitute for
          # signing — see DESIGN.md.
          sbom: true
          provenance: mode=max

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          ref: ${{ github.sha }}

      # Every workflow-context value used below is bound through env and then
      # referenced as a quoted shell variable. Tag names are push-controlled
      # and must never be interpolated straight into a run block.
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # The image tag has no leading "v": docker/metadata-action's
          # {{version}} strips it, so `ghcr.io/$REPO:${TAG#v}` is what was
          # actually pushed. Advertising ":$TAG" points users at a 404.
          notes=$(printf '%s\n\n%s\n' \
            "See [CHANGELOG.md](https://github.com/$REPO/blob/$TAG/CHANGELOG.md) for what changed." \
            "Container image: \`ghcr.io/$REPO:${TAG#v}\`")
          # Idempotent: a re-run after a partially failed release would
          # otherwise abort with "release already exists".
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes "$notes"
          else
            gh release create "$TAG" --title "$TAG" --notes "$notes"
          fi
