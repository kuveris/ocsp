name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Least privilege by default; the publish and release jobs widen this for
# themselves only.
permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.12.2
  COVERAGE_MIN: "85"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # The full suite gates the release: a tag that does not pass does not ship.
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module graph
        run: go mod tidy && git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Lint
        run: golangci-lint run ./...

      - name: Lint (integration build tag)
        run: golangci-lint run --build-tags=integration ./...

      - name: Run unit tests
        run: go test -race ./...

      - name: Run integration tests
        run: go test -race -tags integration ./...

      - name: Coverage
        run: |
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
          ./scripts/coverage-check.sh coverage.out "$COVERAGE_MIN"

  publish:
    name: Build and Publish Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `latest` is not listed explicitly: metadata-action's default
          # flavor adds it for any non-prerelease semver tag, which is the
          # behaviour we want. Adding it by hand both duplicated the argument
          # and would have moved `latest` onto a future -rc tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Every workflow-context value used below is bound through env and then
      # referenced as a quoted shell variable. Tag names are push-controlled
      # and must never be interpolated straight into a run block.
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          notes=$(printf '%s\n\n%s\n' \
            "See [CHANGELOG.md](https://github.com/$REPO/blob/$TAG/CHANGELOG.md) for what changed." \
            "Container image: \`ghcr.io/$REPO:$TAG\`")
          gh release create "$TAG" --title "$TAG" --notes "$notes"
