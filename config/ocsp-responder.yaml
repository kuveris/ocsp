# Example configuration for ocsp-responder.

server:
  listen_addr: "0.0.0.0:8080"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
    min_version: "1.2"    # "1.2" | "1.3"
    acme_host: ""         # optional: hostname for automatic ACME certificate
    acme_ca_url: ""       # optional: ACME directory URL for internal CAs
    # Where ACME certificates are persisted. Default: /var/lib/ocsp-responder/acme.
    # Must be writable by the service user — startup fails if it is not.
    acme_cache_dir: ""

signer:
  # OCSP delegated signing certificate + key.
  # Must have extKeyUsage OCSPSigning.
  cert_file: "certs/ocsp-signer.crt"
  key_file:  "certs/ocsp-signer.key"

  # Issuer certificate of the end-entity certificates checked by this responder.
  issuer_cert_file: "certs/intermediate-ca.crt"

  # Validity window for issued OCSP responses (NextUpdate).
  response_validity: "24h"

source:
  type: "file"   # "file" | "http" | "static"

  file:
    crl_path: "certs/ca.crl"        # PEM or DER
    reload_interval: "5m"           # Checks for changes
    # Optional. How long a CRL stays usable past its NextUpdate. Empty or "0s"
    # is strict: an expired CRL is refused and the responder answers "unknown"
    # rather than serving revocation data the CA has superseded. Set a grace
    # period if your CA publishes late and a short window of slightly-stale
    # data is preferable to an outage.
    expiry_grace: "0s"

  http:
    base_url: "https://ca.example.local:9000"
    root_cert_file: "certs/root-ca.crt"   # optional: TLS pinning
    timeout: "10s"
    retry_max: 3
    retry_backoff: "500ms"
    cache_ttl: "5m"
    response_mapping:
      path_template: "/1.0/certificates/{serial}"
      status_field: "status"
      good_values: ["active", "valid"]
      revoked_values: ["revoked", "suspended"]

  static:
    status: "good"   # "good" | "revoked" | "unknown"

cache:
  enabled: true
  ttl: "1h"
  max_entries: 10000

logging:
  level: "info"    # debug | info | warn | error
  format: "json"   # json | text

