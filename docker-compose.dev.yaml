# Development stack: builds the image from the local Dockerfile instead of
# pulling the published one, so a source change is one `make dev` away from
# running. Configuration is read from ./config, same as the production stack.
services:
  ocsp-responder:
    build: .
    ports:
      - "${OCSP_PORT:-8080}:8080"
    volumes:
      - ./config:/etc/ocsp-responder:ro
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
