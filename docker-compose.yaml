services:
  ocsp-responder:
    image: ${OCSP_IMAGE:-ghcr.io/kuveris/ocsp:latest}
    ports:
      - "${OCSP_PORT:-8080}:8080"
    volumes:
      - ./config:/etc/ocsp-responder:ro
      - ./certs:/certs:ro
      # Writable state for ACME-issued certificates. Without it they are
      # re-ordered on every restart, which exhausts CA rate limits.
      - ocsp-state:/var/lib/ocsp-responder
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ocsp-state:
