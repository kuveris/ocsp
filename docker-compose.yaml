services:
  ocsp-responder:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config:/etc/ocsp-responder:ro
      - ./certs:/certs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
